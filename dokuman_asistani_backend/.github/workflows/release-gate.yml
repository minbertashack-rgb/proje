name: Release Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  release-gate:
    runs-on: ${{ matrix.os }}
    env:
      CI: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Tesseract on Windows (choco)
        if: runner.os == 'Windows'
        run: |
          choco install -y tesseract

      - name: Install python deps (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt -c constraints.txt; fi

      - name: Install python deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt -c constraints.txt }

      - name: Run release checks
        run: |
          python tools/release_checks.py

      - name: OCR smoke (best-effort)
        run: |
          python tools/ocr_smoke.py
        continue-on-error: true

      - name: Benchmark audit
        run: |
          python tools/benchmark_audit.py

      - name: Run release gate
        run: |
          python tools/run_release_gate.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: release_logs/**

      - name: Upload release checks and summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: |
            constraints.txt
            release_checks_report.json
            release_logs/**/release_gate_summary.json
