[pytest]
DJANGO_SETTINGS_MODULE = dokuman_asistani.settings
python_files = test_*.py *_tests.py
testpaths = dokuman/tests
addopts = --reuse-db
markers =
    fast: hızlı unit ve dar yüzey testleri
    medium: orta maliyetli runtime ve API testleri
    slow: ağır integration ve geniş yüzey testleri
    suite_a: panel, analytics ve runtime shard'ı
    suite_b: export, feedback ve productization shard'ı
    suite_c: ingestion, parser, RAG ve concept shard'ı
    release_gate: zorunlu release kapısı testleri
    acceptance: tam acceptance suite'leri
    portability: ortam ve bağımlılık kontrolleri
    e2e: end-to-end smoke tests
    ci: ci-only or fast smoke tests
